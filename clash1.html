<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VES — MATCH RESULTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #e8001d;
      --gold: #c89b3c;
      --darker: #050505;
      --grey: #1a1a1a;
      --text: #d0cfc9;
      --dim: #555;
      --win-bright: #2ecc71;
      --loss-bright: #e74c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--darker);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(5,5,5,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(232,0,29,0.2);
    }

    .nav-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      color: var(--red);
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .nav-brand img { height: 36px; width: auto; display: block; }

    .nav-back {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--red); }

    .results-hero {
      padding: 8rem 2rem 4rem;
      text-align: center;
      background: radial-gradient(ellipse at 50% 100%, #0d1a0a 0%, #050505 65%);
      border-bottom: 1px solid rgba(46,204,113,0.1);
      position: relative;
      overflow: hidden;
    }

    .results-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(46,204,113,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,204,113,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-event  { font-size: 0.65rem; letter-spacing: 0.4em; color: var(--win-bright); margin-bottom: 0.8rem; position: relative; }
    .hero-title  { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 12vw, 9rem); line-height: 0.9; color: #fff; position: relative; }
    .hero-score  { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 18vw, 13rem); line-height: 1; color: var(--win-bright); text-shadow: 0 0 60px rgba(46,204,113,0.3); letter-spacing: 0.1em; position: relative; }
    .hero-sub    { font-size: 0.75rem; letter-spacing: 0.25em; color: var(--dim); margin-top: 0.5rem; position: relative; }

    .page { max-width: 900px; margin: 0 auto; padding: 4rem 2rem 6rem; }

    .section-label { font-size: 0.6rem; letter-spacing: 0.4em; color: var(--red); text-transform: uppercase; margin-bottom: 0.4rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); color: #fff; letter-spacing: 0.05em; margin-bottom: 2rem; }

    /* ── GAME BLOCK (rendered by component) ── */
    .game-block { margin-bottom: 5rem; }

    .game-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }

    .game-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      padding: 0.3rem 0.9rem;
      border: 1px solid rgba(46,204,113,0.4);
      color: var(--win-bright);
    }

    .game-meta { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--dim); }

    .summary-bar {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid #1e1e1e;
      background: var(--grey);
    }

    .sbar-item { display: flex; flex-direction: column; }
    .sbar-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: #fff; line-height: 1; }
    .sbar-key { font-size: 0.52rem; letter-spacing: 0.25em; color: var(--dim); text-transform: uppercase; }

    .scoreboard { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .scoreboard thead tr { border-bottom: 1px solid rgba(232,0,29,0.3); }
    .scoreboard th {
      font-size: 0.55rem; letter-spacing: 0.3em; color: var(--red);
      text-transform: uppercase; padding: 0.5rem 0.8rem;
      text-align: left; font-weight: normal; white-space: nowrap;
    }
    .scoreboard th.center, .scoreboard td.center { text-align: center; }
    .scoreboard td { padding: 0.85rem 0.8rem; border-bottom: 1px solid #161616; vertical-align: middle; }
    .scoreboard tbody tr:hover td { background: #141414; }

    .player-cell { display: flex; flex-direction: column; gap: 0.15rem; }
    .player-ign  { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.05em; color: #fff; }
    .player-champ { font-size: 0.6rem; color: var(--dim); letter-spacing: 0.1em; }

    .role-tag { font-size: 0.5rem; letter-spacing: 0.2em; color: var(--dim); border: 1px solid #2a2a2a; padding: 0.15rem 0.4rem; text-transform: uppercase; }

    .kda-display { display: flex; flex-direction: column; align-items: center; gap: 0.1rem; }
    .kda-nums { font-size: 0.85rem; }
    .kda-nums .k { color: #fff; }
    .kda-nums .sep { color: var(--dim); }
    .kda-nums .d { color: var(--loss-bright); }
    .kda-nums .a { color: var(--gold); }
    .kda-ratio { font-size: 0.62rem; color: var(--dim); }
    .kda-ratio.perfect { color: var(--win-bright); }
    .kda-ratio.great   { color: var(--gold); }

    .stat-val { color: var(--text); }
    .stat-val.highlight { color: var(--gold); }
    .stat-val.mvp-val   { color: var(--win-bright); }

    .mvp-row td { background: rgba(200,155,60,0.05) !important; }
    .mvp-badge { font-size: 0.48rem; letter-spacing: 0.2em; background: var(--gold); color: #000; padding: 0.12rem 0.35rem; vertical-align: middle; margin-left: 0.4rem; }

    .row-win { border-left: 2px solid rgba(46,204,113,0.25); }

    .back-cta { text-align: center; margin-top: 4rem; padding-top: 3rem; border-top: 1px solid #1a1a1a; }
    .back-link {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.25em;
      color: var(--red); text-decoration: none; border: 1px solid rgba(232,0,29,0.3);
      padding: 0.7rem 2rem; transition: background 0.2s, color 0.2s;
    }
    .back-link:hover { background: var(--red); color: #fff; }

    @media (max-width: 600px) {
      .scoreboard th, .scoreboard td { padding: 0.5rem 0.4rem; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><img src="logo.png" /></a>
  <a href="index.html" class="nav-back">← Back to org</a>
</nav>

<div class="results-hero">
  <p class="hero-event">▸ CLASH — SEASON 2026 — BRACKET STAGE</p>
  <div class="hero-title">MATCH RESULTS</div>
  <div class="hero-score">3—0</div>
  <p class="hero-sub">VALOR ESPORT · UNDEFEATED THIS BRACKET · FEARED BY ALL</p>
</div>

<div class="page">
  <p class="section-label">// match_history.log</p>
  <h2 class="section-title">GAME LOG</h2>

  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  HOW TO ADD A GAME                                           ║
  ║                                                              ║
  ║  Copy one <clash-game> tag below and paste it here.         ║
  ║  Fill in:                                                    ║
  ║    num      — Game number (1, 2, 3...)                       ║
  ║    result   — WIN or LOSS                                    ║
  ║    duration — e.g. 31:35                                     ║
  ║    kills / towers / dragons / baron — team summary stats     ║
  ║    players  — JSON array, one object per player:             ║
  ║      name, role, champ, k, d, a, cs, dmg, gold, mvp (bool)  ║
  ╚══════════════════════════════════════════════════════════════╝
  -->

  <clash-game
    num="1" result="WIN" duration="31:35"
    kills="34" towers="8" dragons="2" baron="1"

      { "name": "ond paa den bund","role": "ADC", "champ": "Kaisa",      "k": 10, "d": 9, "a": 10, "cs": 256, "dmg": "30,409", "gold": "17.6k" },
      { "name": "Black Inmate",    "role": "Sup", "champ": "Thresh",     "k": 0,  "d": 7, "a": 23, "cs": 40,  "dmg": "11,240", "gold": "9.6k"  }
    ]'>

  <clash-game
    num="2" result="WIN" duration="28:52"

      { "name": "Spacewaff1e",     "role": "Mid", "champ": "Xerath",     "k": 3,  "d": 3, "a": 9,  "cs": 194, "dmg": "13,989", "gold": "10.1k" },

      { "name": "ond paa den bund","role": "ADC", "champ": "Zeri",       "k": 14, "d": 5, "a": 7,  "cs": 265, "dmg": "47,720", "gold": "19.0k" },
      { "name": "Black Inmate",    "role": "Sup", "champ": "Blitzcrank", "k": 5,  "d": 4, "a": 18, "cs": 25,  "dmg": "8,403",  "gold": "7.7k"  }
    ]'>

  <div class="back-cta">
    <a href="index.html#tournaments" class="back-link">← BACK TO VALOR ESPORT</a>
  </div>
</div>

<script>
  function calcKDA(k, d, a) {
    if (d === 0) return { text: 'Perfect KDA', cls: 'perfect' };
    const ratio = (k + a) / d;
    return {
      text: ratio.toFixed(2) + ' KDA',
      cls:  ratio >= 5 ? 'perfect' : ratio >= 3 ? 'great' : ''
    };
  }

  class ClashGame extends HTMLElement {
    connectedCallback() {
      const num      = this.getAttribute('num');
      const result   = this.getAttribute('result') || 'WIN';
      const duration = this.getAttribute('duration');
      const kills    = this.getAttribute('kills');
      const towers   = this.getAttribute('towers');
      const dragons  = this.getAttribute('dragons');
      const baron    = this.getAttribute('baron');
      const players  = JSON.parse(this.getAttribute('players') || '[]');

      const isWin = result.toUpperCase() === 'WIN';

      const summaryItems = [
        { val: duration, key: 'Duration' },
        { val: kills,    key: 'Team kills' },
        { val: towers,   key: 'Towers' },
        { val: dragons,  key: 'Dragons' },
        { val: baron,    key: 'Baron' },
      ];

      const rows = players.map(p => {
        const kda = calcKDA(p.k, p.d, p.a);
        return `
          <tr class="row-win${p.mvp ? ' mvp-row' : ''}">
            <td>
              <div class="player-cell">
                <span class="player-ign">${p.name}${p.mvp ? '<span class="mvp-badge">MVP</span>' : ''}</span>
                <span class="player-champ">${p.champ}</span>
              </div>
            </td>
            <td class="hide-mobile"><span class="role-tag">${p.role}</span></td>
            <td class="stat-val">${p.champ}</td>
            <td class="center">
              <div class="kda-display">
                <span class="kda-nums">
                  <span class="k">${p.k}</span><span class="sep"> / </span><span class="d">${p.d}</span><span class="sep"> / </span><span class="a">${p.a}</span>
                </span>
                <span class="kda-ratio ${kda.cls}">${kda.text}</span>
              </div>
            </td>
            <td class="center hide-mobile"><span class="stat-val${p.mvp ? ' highlight' : ''}">${p.cs}</span></td>
            <td class="center hide-mobile"><span class="stat-val${p.mvp ? ' mvp-val' : ''}">${p.dmg}</span></td>
            <td class="center hide-mobile"><span class="stat-val">${p.gold}</span></td>
          </tr>`;
      }).join('');

      this.innerHTML = `
        <div class="game-block">
          <div class="game-header">
            <span class="game-badge">GAME ${num} — ${result}</span>
            <div class="game-meta">DURATION: ${duration}</div>
          </div>
          <div class="summary-bar">
            ${summaryItems.map(i => `
              <div class="sbar-item">
                <span class="sbar-val">${i.val}</span>
                <span class="sbar-key">${i.key}</span>
              </div>`).join('')}
          </div>
          <table class="scoreboard">
            <thead><tr>
              <th>Player</th>
              <th class="hide-mobile">Role</th>
              <th>Champion</th>
              <th class="center">K / D / A</th>
              <th class="center hide-mobile">CS</th>
              <th class="center hide-mobile">Dmg</th>
              <th class="center hide-mobile">Gold</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }
  }

  customElements.define('clash-game', ClashGame);
</script>

</body>
</html>
